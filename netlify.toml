[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/login"
  to = "/.netlify/functions/login"
  status = 200

[[redirects]]
  from = "/api/supabase"
  to = "/.netlify/functions/supabase"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
